  gmailClean() {
    const clone = document.getElementById('canvas').cloneNode(true);
    clone.querySelectorAll('iframe,script,style,form,input,button,.slot-hint').forEach(n => n.remove());
    clone.querySelectorAll('*').forEach(n => {
      [...n.attributes].forEach(a => { if (a.name.startsWith('on')) n.removeAttribute(a.name); });
      n.removeAttribute('contenteditable'); n.removeAttribute('data-label');
      n.removeAttribute('data-cid'); n.classList.remove('el-selected', 'el-hovered');
      if (!n.className) n.removeAttribute('class');
      if (n.tagName === 'A') { n.setAttribute('target', '_blank'); n.setAttribute('rel', 'noopener'); }
    });
    return clone.innerHTML.trim();
  },

  html() {
    const doc = this.buildDocument();
    if (!doc) { App.toast('No hay contenido', 'er'); return; }
    const name = `gamonal-${App.timestamp()}.html`;
    App.download(new Blob([doc], { type: 'text/html;charset=utf-8' }), name);
    Storage.log(App.user, 'export-html', name);
    App.toast('HTML exportado ✓', 'ok');
  },

  gmailHTML() {
    const doc = this.buildDocument(true);
    if (!doc) { App.toast('No hay contenido', 'er'); return; }
    const name = `gamonal-gmail-${App.timestamp()}.html`;
    App.download(new Blob([doc], { type: 'text/html;charset=utf-8' }), name);
    App.toast('HTML Gmail exportado ✓', 'ok');
  },

  preview() {
    const doc = this.buildDocument();
    if (!doc) { App.toast('No hay contenido', 'er'); return; }
    const url = URL.createObjectURL(new Blob([doc], { type: 'text/html' }));
    window.open(url, '_blank', 'noopener');
    App.toast('Preview abierto en nueva pestaña', 'ok');
  },

  async copyGmail() {
    const html = `<table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0"><tr><td>${this.gmailClean()}</td></tr></table>`;
    if (!html.includes('<')) { App.toast('Sin contenido', 'er'); return; }
    try {
      await navigator.clipboard.write([new ClipboardItem({
        'text/html':  new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([document.getElementById('canvas').innerText || ''], { type: 'text/plain' }),
      })]);
      App.toast('Copiado para Gmail ✓ — pega en el cuerpo del correo', 'ok');
    } catch {
      App.toast('No se pudo copiar automáticamente. Usa "HTML Gmail" para descargar.', 'er');
    }
  },

  async jpg() {
    if (!App.hasContent()) { App.toast('No hay contenido', 'er'); return; }
    App.toast('Generando imagen en alta calidad…', 'in');
    const prev = App.selEl;
    document.body.classList.add('exporting');
    Toolbar.hide();
    document.getElementById('ctxMenu').classList.remove('show');
    if (prev) { prev.classList.remove('el-selected'); prev.classList.remove('el-hovered'); }

    try {
      if (!window.html2canvas) {
        await new Promise((res, rej) => {
          const s = Object.assign(document.createElement('script'), {
            src: 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
            onload: res, onerror: rej,
          });
          document.head.appendChild(s);
        });
      }

      const canvasEl = document.getElementById('canvas');

      /* Remove zoom/scale so html2canvas reads real pixels */
      const prevZoom = canvasEl.style.zoom;
      canvasEl.style.zoom = '1';

      /* Measure actual content height (not the fixed container height) */
      const children = [...canvasEl.children].filter(el =>
        !el.classList.contains('drop-zone') && !el.classList.contains('slot-hint')
      );
      let contentH = 0;
      children.forEach(el => {
        const r = el.getBoundingClientRect();
        const top = el.offsetTop;
        contentH = Math.max(contentH, top + el.offsetHeight);
      });
      /* Use scrollHeight as fallback — it reflects real content */
      const captureH = contentH > 0 ? contentH : canvasEl.scrollHeight;
      const captureW = canvasEl.scrollWidth || canvasEl.offsetWidth;

      /* Temporarily set canvas to exact content size */
      const prevH = canvasEl.style.height;
      const prevMinH = canvasEl.style.minHeight;
      const prevOverflow = canvasEl.style.overflow;
      canvasEl.style.height = captureH + 'px';
      canvasEl.style.minHeight = captureH + 'px';
      canvasEl.style.overflow = 'hidden';

      /* Wait one frame for reflow */
      await new Promise(r => requestAnimationFrame(r));
      await new Promise(r => setTimeout(r, 80));

      const rendered = await html2canvas(canvasEl, {
        useCORS:         true,
        allowTaint:      true,
        backgroundColor: '#ffffff',
        scale:           3,          /* 3x = alta resolución para publicar */
        logging:         false,
        width:           captureW,
        height:          captureH,
        windowWidth:     captureW,
        windowHeight:    captureH,
        x:               0,
        y:               0,
      });

      /* Restore canvas */
      canvasEl.style.height    = prevH;
      canvasEl.style.minHeight = prevMinH;
      canvasEl.style.overflow  = prevOverflow;
      canvasEl.style.zoom      = prevZoom;

      const name = 'easyhtml-' + App.timestamp() + '.jpg';
      rendered.toBlob(blob => App.download(blob, name), 'image/jpeg', 0.95);
      Storage.log(App.user, 'export-jpg', name);
      App.toast('JPG exportado en alta calidad ✓', 'ok');

    } catch (e) {
      console.error(e);
      App.toast('Error al generar JPG: ' + e.message, 'er');
    } finally {
      document.body.classList.remove('exporting');
      if (prev) { prev.classList.add('el-selected'); Toolbar.show(prev); }
    }
  },

  publish() {
    const doc = this.buildDocument();
    if (!doc) { App.toast('Sin contenido', 'er'); return; }
    App.download(new Blob([doc], { type: 'text/html' }), 'index.html');
    window.open('https://app.netlify.com/drop', '_blank', 'noopener');
    App.toast('index.html descargado. Suéltalo en Netlify Drop para obtener URL.', 'ok');
  },
};

      item.className = 'proj-item';
      item.innerHTML = `<div><div class="proj-name"></div><div class="proj-meta"></div></div><div class="proj-actions"></div>`;
      item.querySelector('.proj-name').textContent = p.name;
      item.querySelector('.proj-meta').textContent = `Por ${p.user} — ${d}`;
      const acts = item.querySelector('.proj-actions');
      const open = Object.assign(document.createElement('button'), { className: 'mbtn mbtn-primary mbtn-sm', textContent: 'Abrir' });
      open.addEventListener('click', () => this.load(p.id));
      const del = Object.assign(document.createElement('button'), { className: 'mbtn mbtn-danger mbtn-sm', textContent: 'Eliminar' });
      del.addEventListener('click', () => { if (confirm('¿Eliminar?')) { Storage.deleteProject(p.id); item.remove(); App.toast('Eliminado', 'in'); } });
      acts.append(open, del);
      wrap.appendChild(item);
    });
  },

  load(id) {
    const p = Storage.getProject(id);
    if (!p) return;
    if (App.hasContent() && !confirm(`¿Cargar "${p.name}"?`)) return;
    const canvas = document.getElementById('canvas');
    canvas.innerHTML = p.html || '';
    App.userCss = p.css || '';
    const cssBox = document.getElementById('code-css');
    if (cssBox) { cssBox.value = App.userCss; cssBox.dataset.dirty = '0'; }
    Code.applyUserCSS(true);
    if (p.size) App.setCanvasSize(p.size.w || '100%', p.size.h || 'auto', p.size.preset || 'custom', { history: false });
    Canvas.rebind(); Selection.clear();
    App.closeModal('mProj'); History.push(); Layers.update();
    App.user = p.user; Storage.log(p.user, 'load', p.name);
    App.toast(`"${p.name}" cargado ✓`, 'ok');
  },
};



/* ════════════════════════════════
   INIT
   ════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {

  /* Fecha */
  document.getElementById('bDate').textContent =
    new Date().toLocaleDateString('es-CL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  /* Preferencias guardadas */
  if (Storage.getSetting('dark')) document.body.classList.add('dark');
  App.user = Storage.getSetting('user', '');

  /* Canvas inicial */
  const savedSize = Storage.getSetting('canvasSize');
  if (savedSize) App.setCanvasSize(savedSize.w || '1180px', savedSize.h || 'auto', savedSize.preset || 'custom', { history: false });
  else App.setCanvasSize('1180', 'auto', '1180xauto', { history: false });

  Canvas.clear(false);
  Canvas.init();
  Blocks.build();
  /* Re-bind after clear */
  Code.init();

  /* Reglas */
  Rulers.update();
  new ResizeObserver(Rulers.update.bind(Rulers)).observe(document.getElementById('canvas'));
  window.addEventListener('resize', Rulers.update.bind(Rulers));
  document.getElementById('canvas-area').addEventListener('scroll', Rulers.update.bind(Rulers));

  /* Historial inicial */
  History.push();

  /* Tabs panel derecho */
  document.querySelectorAll('.rtab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.rtab').forEach(t => t.classList.remove('on'));
      document.querySelectorAll('.rpane').forEach(p => p.classList.remove('on'));
      tab.classList.add('on');
      const paneId = 'p' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1);
      document.getElementById(paneId)?.classList.add('on');
      if (tab.dataset.tab === 'code')   Code.update();
      if (tab.dataset.tab === 'layers') Layers.update();
    });
  });

  /* Toolbar flotante */
  document.getElementById('tbDel')?.addEventListener('click', () => Canvas.deleteSelected());
  document.getElementById('tbDup')?.addEventListener('click', () => Canvas.duplicate());
  document.getElementById('tbUp')?.addEventListener('click',  () => Canvas.move(-1));
  document.getElementById('tbDn')?.addEventListener('click',  () => Canvas.move(1));

  /* Menú contextual */
  const canvas = document.getElementById('canvas');
  const ctx    = document.getElementById('ctxMenu');
  canvas.addEventListener('contextmenu', e => {
    const target = e.target.closest('[data-label],img,a,[contenteditable]');
    if (!target || !canvas.contains(target)) return;
    e.preventDefault();
    const root = Selection.getRoot(target);
    if (!root) return;
    Selection.select(root);
    ctx.style.left = Math.min(e.clientX, window.innerWidth - 170) + 'px';
    ctx.style.top  = Math.min(e.clientY, window.innerHeight - 150) + 'px';
    ctx.classList.add('show');
  });
  ctx.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = btn.dataset.act;
      if (act === 'delete')    Canvas.deleteSelected();
      if (act === 'duplicate') Canvas.duplicate();
      if (act === 'up')        Canvas.move(-1);
      if (act === 'down')      Canvas.move(1);
      ctx.classList.remove('show');
    });
  });
  document.addEventListener('click', e => {
    if (!ctx.contains(e.target)) ctx.classList.remove('show');
    if (App.selEl && !App.selEl.contains(e.target) && !e.target.closest('#pr,#pl,#hdr,.modal-overlay,#eltb,#ctxMenu')) {
      Selection.clear();
    }
  });

  /* Colapsar paneles */
  document.getElementById('toggleLeft')?.addEventListener('click', () => {
    document.body.classList.toggle('left-collapsed');
    setTimeout(Rulers.update.bind(Rulers), 200);
  });
  document.getElementById('toggleRight')?.addEventListener('click', () => {
    document.body.classList.toggle('right-collapsed');
    setTimeout(Rulers.update.bind(Rulers), 200);
  });

  /* Logo */
  document.getElementById('logoUpload')?.addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      const img = document.getElementById('logoImg');
      const ph  = document.getElementById('logoPH');
      img.src = ev.target.result;
      img.style.display = 'block';
      ph.style.display  = 'none';
    };
    r.readAsDataURL(f);
  });

  /* Tema */
  document.getElementById('bTheme')?.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    Storage.setSetting('dark', document.body.classList.contains('dark'));
  });

  /* Deshacer / Rehacer / Limpiar */
  document.getElementById('bUndo')?.addEventListener('click', () => History.undo());
  document.getElementById('bRedo')?.addEventListener('click', () => History.redo());
  document.getElementById('bClear')?.addEventListener('click', () => Canvas.clear(true));

  /* Guardar / Proyectos */
  document.getElementById('bSave')?.addEventListener('click', () => App.openModal('mSave'));
  document.getElementById('bConfSave')?.addEventListener('click', () => Projects.save());
  document.getElementById('bProj')?.addEventListener('click', () => { Projects.render(); App.openModal('mProj'); });
  document.getElementById('bCSV')?.addEventListener('click', () => Storage.exportCSV());

  /* Exportar */
  document.getElementById('bPreview')?.addEventListener('click', () => Export.preview());
  document.getElementById('bCopyGmail')?.addEventListener('click', () => Export.copyGmail());
  document.getElementById('bGmailHTML')?.addEventListener('click', () => Export.gmailHTML());
  document.getElementById('bPublish')?.addEventListener('click', () => Export.publish());
  document.getElementById('bHTML')?.addEventListener('click', () => Export.html());
  document.getElementById('bJPG')?.addEventListener('click', () => Export.jpg());

  /* Plantillas */
  document.getElementById('tplSel')?.addEventListener('change', e => {
    const k = e.target.value; if (!k) return;
    Templates.load(k); e.target.value = '';
  });

  /* Canvas size controls */
  document.getElementById('canvasPreset')?.addEventListener('change', e => App.applyCanvasPreset(e.target.value));
  document.getElementById('applyCanvasSize')?.addEventListener('click', () => App.applyCustomCanvasSize());
  ['canvasW', 'canvasH'].forEach(id =>
    document.getElementById(id)?.addEventListener('keydown', e => { if (e.key === 'Enter') App.applyCustomCanvasSize(); })
  );
  document.querySelectorAll('.vb').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.vb').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      App.setCanvasSize(btn.dataset.w, App.getCanvasSize().h, btn.dataset.preset || 'custom');
    });
  });

  /* Cerrar modales */
  document.querySelectorAll('[data-close]').forEach(btn => btn.addEventListener('click', () => App.closeModal(btn.dataset.close)));
  document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) App.closeModal(o.id); }));
  document.addEventListener('keydown', e => {
    /* Escape cierra modales */
    if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => App.closeModal(m.id));
    const tag = (e.target?.tagName || '').toLowerCase();
    const editing = tag === 'input' || tag === 'textarea' || tag === 'select' || e.target?.isContentEditable;
    /* Ctrl+Z / Ctrl+Y */
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); History.undo(); }
    if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) { e.preventDefault(); History.redo(); }
    /* Ctrl+S */
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') { e.preventDefault(); App.openModal('mSave'); }
    /* Delete/Backspace en canvas */
    if (!editing && App.selEl && (e.key === 'Backspace' || e.key === 'Delete')) { e.preventDefault(); Canvas.deleteSelected(); }
  });

  /* Autoguardado restaurar */
  const saved = Storage.getAutosave();
  if (saved?.html?.trim()) {
    if (confirm('Hay un autoguardado anterior. ¿Cargarlo?')) {
      document.getElementById('canvas').innerHTML = saved.html;
      App.userCss = saved.css || '';
      const cssBox = document.getElementById('code-css');
      if (cssBox) { cssBox.value = App.userCss; cssBox.dataset.dirty = '0'; }
      Code.applyUserCSS(true);
      if (saved.size) App.setCanvasSize(saved.size.w || '100%', saved.size.h || 'auto', saved.size.preset || 'custom', { history: false });
      Canvas.rebind(); Selection.clear(); History.push(); Layers.update();
      App.toast('Autoguardado recuperado ✓', 'ok');
    }
  }

  /* Usuario */
  if (!App.user) {
    setTimeout(() => {
      const n = prompt('Hola. ¿Cuál es tu nombre? (para el registro de uso)');
      if (n?.trim()) { App.user = n.trim(); Storage.setSetting('user', App.user); App.toast(`Bienvenido/a, ${App.user} ✓`, 'ok'); }
    }, 800);
  }


  /* ── Panel resizers ── */
  (function() {
    function makeResizer(resizerId, panelVar, side) {
      const resizer = document.getElementById(resizerId);
      if (!resizer) return;
      let dragging = false, startX = 0, startW = 0;

      resizer.addEventListener('mousedown', e => {
        e.preventDefault();
        dragging = true;
        startX = e.clientX;
        startW = parseInt(getComputedStyle(document.documentElement).getPropertyValue(panelVar)) || 220;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const delta = side === 'left' ? (e.clientX - startX) : (startX - e.clientX);
        const newW = Math.min(400, Math.max(140, startW + delta));
        document.documentElement.style.setProperty(panelVar, newW + 'px');
        Rulers.update();
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        resizer.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    }

    makeResizer('resizerLeft',  '--left-w',  'left');
    makeResizer('resizerRight', '--right-w', 'right');
  })();
  console.log('%c HTML Editor by Gamonal v5 — código limpio', 'color:#040764;font-weight:700;font-size:13px');
});

</script>
