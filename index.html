<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HTML Editor by Gamonal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
/* ============================================================
   Easy HTML — style.css
   Estilo: Power Research by Radar
   Navy #040764 · Blue #1C73CB · Teal #26B0B0 · Yellow #FFE53E
   ============================================================ */

/* ── Variables ── */
:root {
  --navy:      #040764;
  --navy-2:    #06094e;
  --blue:      #1C73CB;
  --blue-soft: #e8f2fb;
  --blue-mid:  #1558a0;
  --teal:      #26B0B0;
  --yellow:    #FFE53E;

  --white:   #ffffff;
  --bg:      #f0f2f5;
  --surface: #ffffff;
  --border:  #e2e4e9;
  --border2: #c8cad0;

  --text:    #111827;
  --text2:   #4b5563;
  --text3:   #8b949e;
  --text4:   #c0c6d0;

  --radius:    6px;
  --radius-md: 8px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 28px rgba(0,0,0,.14);

  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;

  --header-h: 46px;
  --left-w:   220px;
  --right-w:  220px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

/* ════════════════════════════════
   HEADER — idéntico a Power Research
   ════════════════════════════════ */
#hdr {
  height: var(--header-h);
  min-height: var(--header-h);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--navy);
  z-index: 100;
}

/* ── TOOLBAR BAR (debajo del header) ── */
#toolbar {
  height: 48px;
  min-height: 48px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  overflow-x: auto;
  scrollbar-width: none;
}
#toolbar::-webkit-scrollbar { display: none; }
.tb-sep {
  width: 1px; height: 22px;
  background: var(--border2);
  flex-shrink: 0;
  margin: 0 2px;
}
/* Toolbar buttons (light, sobre fondo blanco) */
.tb-action {
  height: 32px;
  padding: 0 10px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-family: var(--font);
  font-size: .72rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all .12s;
  flex-shrink: 0;
}
.tb-action:hover { background: var(--bg); border-color: var(--border2); color: var(--text); }
.tb-action svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.tb-action.primary { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 700; }
.tb-action.primary:hover { background: var(--blue-mid); }
.tb-action.teal { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 700; }
.tb-action.teal:hover { background: #1e9898; }
.tb-action.icon-only { width: 32px; padding: 0; justify-content: center; }
.tb-action svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

/* Zona de marca — misma anchura que sidebar */
.hdr-brand {
  width: var(--left-w);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0 14px;
  border-right: 1px solid rgba(255,255,255,.08);
  height: 100%;
  cursor: pointer;
  transition: background .15s;
  text-decoration: none;
}
.hdr-brand:hover { background: rgba(255,255,255,.05); }

.brand-logo {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.brand-logo img { width: 100%; height: 100%; object-fit: contain; display: none; border-radius: 7px; }
.brand-logo svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
input#logoUpload { display: none; }

.brand-text { min-width: 0; }
.brand-name {
  font-size: .8rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-name em { color: rgba(255,255,255,.55); font-style: normal; font-weight: 400; }
.brand-name b  { color: rgba(255,255,255,.5); font-weight: 500; }
.brand-sub {
  font-size: .62rem;
  color: rgba(255,255,255,.42);
  line-height: 1;
  margin-top: 1px;
  white-space: nowrap;
}

/* hdr-mid removed - controls moved to toolbar */

/* Separador vertical */
.vsep {
  width: 1px;
  height: 20px;
  background: rgba(255,255,255,.15);
  flex-shrink: 0;
  margin: 0 2px;
}

/* Select plantilla */
.hdr-select {
  height: 32px;
  padding: 0 9px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: .73rem;
  cursor: pointer;
  outline: none;
  min-width: 180px;
  max-width: 220px;
  transition: border-color .15s;
}
.hdr-select:focus { border-color: var(--blue); }

/* Canvas size control */
.canvas-ctl {
  display: flex;
  align-items: center;
  gap: 3px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 5px;
  height: 32px;
  flex-shrink: 0;
}
.canvas-ctl select {
  height: 22px;
  border: none;
  background: transparent;
  color: var(--text);
  font-family: var(--font);
  font-size: .72rem;
  outline: none;
  cursor: pointer;
  min-width: 110px;
}
.canvas-ctl select option { background: var(--navy); }
.canvas-ctl input {
  width: 52px; height: 22px;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 4px;
  background: rgba(255,255,255,.1);
  color: var(--text);
  font-family: var(--font);
  font-size: .72rem;
  text-align: center;
  outline: none;
  padding: 0 3px;
}
.canvas-ctl input::placeholder { color: var(--text3); }
.canvas-ctl input:focus { border-color: var(--blue); background: var(--bg); }
.canvas-ctl span { color: rgba(255,255,255,.4); font-size: .7rem; font-weight: 600; }
.canvas-ctl .apply-btn {
  width: 22px; height: 22px;
  border: none; border-radius: 4px;
  background: var(--blue);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  flex-shrink: 0;
}
.canvas-ctl .apply-btn:hover { background: var(--blue-mid); }
.canvas-ctl .apply-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* Vista responsive */
.view-group {
  display: flex;
  gap: 1px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2px;
  flex-shrink: 0;
}
.vb {
  width: 26px; height: 24px;
  border: none; border-radius: 4px;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.vb:hover { background: var(--border); color: var(--text); }
.vb.on { background: var(--blue); color: #fff; }
.vb svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* Autosave */
.autosave {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: .68rem;
  color: var(--text3);
  white-space: nowrap;
  flex-shrink: 0;
}
.as-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #22c55e;
  transition: background .3s;
}
.as-dot.saving { background: #f59e0b; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* hdr-actions removed - moved to toolbar */

/* Botones de acción en header */
.hb {
  height: 30px;
  padding: 0 10px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.9);
  font-family: var(--font);
  font-size: .72rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, border-color .12s;
  flex-shrink: 0;
}
.hb:hover { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.24); }
.hb svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

/* Variantes de botón */
.hb-blue   { background: var(--blue) !important; border-color: var(--blue) !important; font-weight: 700 !important; }
.hb-blue:hover { background: var(--blue-mid) !important; }
.hb-white  { background: #fff !important; color: var(--navy) !important; border-color: #fff !important; font-weight: 700 !important; }
.hb-white:hover { background: #e8f2fb !important; }
.hb-teal   { background: var(--teal) !important; border-color: var(--teal) !important; color: #fff !important; font-weight: 700 !important; }
.hb-teal:hover { background: #1e9898 !important; }
.hb-icon   { width: 30px; padding: 0; justify-content: center; }

/* ════════════════════════════════
   WORKSPACE
   ════════════════════════════════ */
#ws {
  flex: 1;
  height: 0; /* fuerza flex child a no overflowear */
  display: grid;
  grid-template-columns: var(--left-w) minmax(0, 1fr) var(--right-w);
  overflow: hidden;
  background: var(--bg);
}

/* ════════════════════════════════
   PANEL IZQUIERDO — misma estética
   que sidebar de Power Research
   ════════════════════════════════ */
#pl {
  grid-column: 1;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .18s ease;
}

/* Encabezado del sidebar */
.sidebar-head {
  padding: 16px 14px 8px;
  flex-shrink: 0;
}
.sidebar-section-label {
  font-size: .62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text3);
  margin-bottom: 6px;
}

/* Tabs de categoría de bloques */
#blklist {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.block-tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, auto);
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}
.block-tab {
  height: 52px;
  border: none;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: color .12s, background .12s;
  overflow: hidden;
  padding: 4px 2px;
}
.block-tab:nth-child(4n) { border-right: none; }
.block-tab:nth-child(n+5) { border-bottom: none; }
.tab-icon { font-size: .6rem; font-weight: 900; color: var(--blue); line-height: 1; letter-spacing: .04em; text-transform: uppercase; }
.tab-label { font-size: .62rem; font-weight: 500; color: var(--text3); white-space: nowrap; line-height: 1; }
.block-tab:hover { background: var(--bg); }
.block-tab:hover .tab-label { color: var(--text); }
.block-tab:hover .tab-icon { color: var(--blue-mid); }
.block-tab.on { background: var(--blue-soft); box-shadow: inset 2px 0 0 var(--blue); }
.block-tab.on .tab-label { color: var(--blue); }
.block-tab.on .tab-icon { color: var(--blue); }

/* Lista de bloques — igual a items de sidebar de Power Research */
.block-grid {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.blk {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 16px;
  border: none;
  border-left: 3px solid transparent;
  background: transparent;
  cursor: grab;
  user-select: none;
  transition: background .1s, border-color .1s;
  text-align: left;
}
.blk:hover {
  background: var(--blue-soft);
  border-left-color: var(--blue);
}
.blk:active { cursor: grabbing; }
.blk * { pointer-events: none; }

.blk-icon {
  width: 30px; height: 30px;
  border-radius: 7px;
  background: var(--blue-soft);
  color: var(--blue);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.blk-icon svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.blk-label { font-size: .8rem; font-weight: 600; color: var(--text2); line-height: 1.3; }

/* ════════════════════════════════
   CANVAS CENTRAL
   ════════════════════════════════ */
#canvas-wrap {
  grid-column: 2;
  background: var(--bg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* ── Resizer handles ── */
.panel-resizer {
  position: absolute;
  top: 0; bottom: 0;
  width: 5px;
  cursor: col-resize;
  z-index: 50;
  background: transparent;
  transition: background .15s;
}
.panel-resizer:hover, .panel-resizer.dragging { background: var(--blue); opacity: .5; }
.resizer-left  { left: 0; }
.resizer-right { right: 0; }

#canvas-area {
  flex: 1;
  overflow: auto;
  padding: 36px 24px 36px 46px;
  position: relative;
  min-height: 0;
}

/* Reglas */
.dim-rule {
  position: absolute;
  z-index: 10;
  pointer-events: none;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text4);
}
#dimTop  { top: 10px; left: 46px; height: 18px; border-bottom: 1px solid var(--border2); }
#dimLeft { left: 14px; top: 36px; width: 20px;  border-right: 1px solid var(--border2); }
.dim-tick { position: absolute; background: var(--border2); }
#dimTop  .dim-tick { bottom: 0; width: 1px; height: 5px; }
#dimTop  .dim-tick.major { height: 9px; }
#dimLeft .dim-tick { right: 0; width: 5px; height: 1px; }
#dimLeft .dim-tick.major { width: 9px; }
.dim-label { position: absolute; white-space: nowrap; color: var(--text4); }
#dimTop  .dim-label { top: 0; transform: translateX(-50%); }
#dimLeft .dim-label { right: 12px; transform: translateY(-50%) rotate(-90deg); transform-origin: center; }

/* Badge de vista */
#viewBadge {
  position: absolute;
  top: 8px; right: 24px;
  background: var(--navy);
  color: rgba(255,255,255,.85);
  border-radius: 5px;
  padding: 3px 8px;
  font-size: .66rem;
  font-weight: 600;
  z-index: 20;
  pointer-events: none;
  box-shadow: var(--shadow-sm);
}

/* El lienzo */
#canvas {
  background: #fff;
  min-height: 420px;
  border: 1px solid rgba(148,163,184,.2);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow);
  position: relative;
  transform-origin: top left;
}

/* Selección / hover */
.el-selected { outline: 2px solid var(--blue) !important; outline-offset: 1px; }
.el-hovered  { outline: 1.5px dashed var(--teal) !important; outline-offset: 1px; }

/* Drop zones */
.drop-zone {
  min-height: 36px;
  border: 2px dashed var(--border2);
  border-radius: var(--radius);
  margin: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; color: var(--text4);
  transition: all .2s;
}
.drop-zone.drag-over { border-color: var(--blue); background: var(--blue-soft); color: var(--blue); }
.inner-drop {
  min-height: 80px;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  background: #fff;
  padding: 8px;
  display: flex; flex-direction: column; gap: 8px;
}
.inner-drop.drag-over { border-color: var(--blue); background: var(--blue-soft); }
.slot-hint {
  color: var(--text4); font-size: .68rem;
  text-align: center; padding: 16px 8px;
  pointer-events: none;
}
/* Visual feedback for ANY droppable element when dragging */
body.dragging div:not(.slot-hint):not(.blk-icon):hover,
body.dragging section:hover,
body.dragging article:hover,
body.dragging header:hover,
body.dragging footer:hover {
  outline: 2px dashed var(--teal) !important;
  outline-offset: 2px;
}
.drag-over {
  outline: 2px solid var(--blue) !important;
  outline-offset: 2px;
  background-color: rgba(28,115,203,.06) !important;
}
body.exporting .slot-hint { display: none !important; }
body.exporting .el-selected,
body.exporting .el-hovered { outline: none !important; }
.media-frame { width: 100%; max-width: 640px; margin: 0 auto; }
.media-frame iframe { width: 100%; height: 260px; display: block; border: 0; border-radius: var(--radius); }

/* Botones colapsar (dentro de canvas-wrap, position absolute) */
.edge-toggle {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 30;
  width: 18px;
  height: 52px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: color .15s, background .15s, border-color .15s;
}
.edge-toggle:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-soft); }
.edge-toggle svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.edge-left  { left: 0; border-radius: 0 5px 5px 0; }
.edge-right { right: 0; border-radius: 5px 0 0 5px; }

body.left-collapsed  { --left-w: 0px; }
body.right-collapsed { --right-w: 0px; }
body.left-collapsed  #pl { overflow: hidden; border-right: 0; }
body.right-collapsed #pr { overflow: hidden; border-left: 0; }
body.left-collapsed  #toggleLeft svg  { transform: rotate(180deg); }
body.right-collapsed #toggleRight svg { transform: rotate(180deg); }

/* ════════════════════════════════
   PANEL DERECHO — Propiedades
   ════════════════════════════════ */
#pr {
  grid-column: 3;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: 100%;
}

/* Tabs */
.rtabs {
  display: flex;
  height: 44px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
  padding: 0 2px;
  gap: 0;
}
.rtab {
  flex: 1;
  height: 44px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-family: var(--font);
  font-size: .68rem;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 4px;
  border-bottom: 2px solid transparent;
  transition: color .12s, border-color .12s;
  white-space: nowrap;
  letter-spacing: .01em;
}
.rtab svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.rtab:hover { color: var(--text); }
.rtab.on { color: var(--blue); border-bottom-color: var(--blue); }

.rpane { display: none; flex: 1; overflow-y: auto; flex-direction: column; min-height: 0; }
.rpane.on { display: flex; flex-direction: column; }
#styleProps { flex: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; }

.no-sel {
  padding: 32px 16px;
  font-size: .76rem;
  color: var(--text3);
  text-align: center;
  line-height: 1.7;
}

/* Secciones de propiedades */
.sec { border-bottom: 1px solid var(--border); }
.sec-title {
  padding: 10px 14px 4px;
  font-size: .62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text3);
}
.sec-body { padding: 4px 14px 12px; display: flex; flex-direction: column; gap: 5px; }

.prop { display: flex; flex-direction: column; gap: 2px; }
.prop label { font-size: .65rem; color: var(--text2); font-weight: 600; }
.prop input, .prop select, .prop textarea {
  width: 100%; padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: .72rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color .12s, box-shadow .12s;
}
.prop input:focus, .prop select:focus, .prop textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(28,115,203,.1);
}
.prop input[type=color] { height: 28px; padding: 2px 4px; cursor: pointer; }
.prop input[readonly]   { background: var(--bg); color: var(--text3); cursor: default; }
.prop-row { display: flex; gap: 5px; }
.prop-row .prop { flex: 1; min-width: 0; }

/* Mini textarea código */
.mini-code {
  width: 100%; min-height: 72px;
  background: #1a1a2e; color: #cdd6f4;
  border: none; border-radius: var(--radius);
  padding: 7px; font-family: var(--mono);
  font-size: .66rem; line-height: 1.5; resize: vertical;
}

/* ── Panel Capas ── */
#layersList { padding: 4px; }
.layer {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 10px;
  border-left: 3px solid transparent;
  cursor: pointer;
  font-size: .72rem; color: var(--text2);
  transition: all .1s;
  margin-bottom: 1px;
}
.layer:hover { background: var(--bg); }
.layer.on { background: var(--blue-soft); color: var(--blue); border-left-color: var(--blue); }
.layer-tag {
  font-size: .58rem; background: var(--bg);
  padding: 2px 4px; border-radius: 3px;
  color: var(--text3); font-family: var(--mono); flex-shrink: 0;
}

/* ── Panel Código ── */
.code-panel { display: flex; flex-direction: column; }
.code-section { border-bottom: 1px solid var(--border); }
.code-head {
  padding: 7px 12px 5px;
  font-size: .62rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--text3); background: var(--bg);
  display: flex; align-items: center; justify-content: space-between;
}
.code-actions {
  display: flex; gap: 5px;
  padding: 5px 8px; background: #13131f;
}
.code-ta {
  width: 100%;
  background: #1e1e2e; color: #cdd6f4;
  border: none; padding: 9px;
  font-family: var(--mono); font-size: .7rem;
  line-height: 1.6; resize: none; outline: none; tab-size: 2;
}
.ta-html { height: 160px; }
.ta-css  { height: 120px; }
.ta-sel  { height: 90px;  }

.code-import-row {
  display: flex; gap: 5px;
  padding: 7px 10px; border-bottom: 1px solid var(--border);
  background: var(--bg);
}

/* Botones de código */
.btn-code {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 9px; border-radius: 4px;
  font-family: var(--font); font-size: .67rem; font-weight: 700;
  cursor: pointer; border: none; transition: background .12s;
  white-space: nowrap;
}
.btn-primary   { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue-mid); }
.btn-secondary { background: #21262d; color: #93c5fd; border: 1px solid #3d444d; }
.btn-secondary:hover { background: #30363d; }
.btn-ghost     { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }

/* ════════════════════════════════
   TOOLBAR FLOTANTE
   ════════════════════════════════ */
#eltb {
  position: fixed; z-index: 500;
  background: var(--navy);
  border-radius: var(--radius);
  display: none; gap: 2px; padding: 3px;
  box-shadow: var(--shadow-lg);
}
#eltb.show { display: flex; }
.tb-btn {
  width: 24px; height: 24px;
  background: transparent; border: none; border-radius: 4px;
  cursor: pointer; color: rgba(255,255,255,.8);
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.tb-btn:hover { background: rgba(255,255,255,.12); color: var(--yellow); }
.tb-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ════════════════════════════════
   MENÚ CONTEXTUAL
   ════════════════════════════════ */
#ctxMenu {
  position: fixed; z-index: 700;
  display: none; min-width: 148px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg); padding: 4px;
}
#ctxMenu.show { display: block; }
.ctx-item {
  width: 100%; border: none; background: transparent;
  color: var(--text); padding: 6px 10px;
  text-align: left; border-radius: 4px;
  font-family: var(--font); font-size: .74rem;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  transition: background .1s;
}
.ctx-item svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.ctx-item:hover { background: var(--bg); }
.ctx-item.danger { color: #dc2626; }
.ctx-item.danger:hover { background: #fef2f2; }

/* ════════════════════════════════
   MODALES
   ════════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(4,7,100,.4); z-index: 9000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; animation: fadeIn .16s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: var(--surface); border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg); width: 420px;
  max-width: 95vw; max-height: 88vh; overflow-y: auto;
  animation: slideUp .18s ease;
}
.modal.wide { width: 540px; }
@keyframes slideUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 11px; border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: .88rem; font-weight: 700; color: var(--navy); }
.modal-close {
  width: 24px; height: 24px; background: var(--bg);
  border: none; border-radius: 50%; cursor: pointer;
  color: var(--text3); display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-close svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
.modal-body   { padding: 14px 18px; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 7px;
  padding: 10px 18px 14px; border-top: 1px solid var(--border);
}
.form-label { display: block; font-size: .72rem; font-weight: 600; color: var(--text2); margin: 9px 0 3px; }
.form-label:first-child { margin-top: 0; }
.form-input {
  width: 100%; padding: 7px 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  font-family: var(--font); font-size: .78rem; color: var(--text);
  background: var(--bg); outline: none; transition: border-color .12s, box-shadow .12s;
}
.form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(28,115,203,.1); }

/* Proyectos */
.proj-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px; border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: var(--radius); margin-bottom: 7px;
  background: var(--bg); transition: border-color .12s, background .12s;
}
.proj-item:hover { background: var(--blue-soft); }
.proj-name  { font-weight: 700; font-size: .78rem; color: var(--navy); }
.proj-meta  { font-size: .66rem; color: var(--text3); margin-top: 2px; }
.proj-actions { display: flex; gap: 5px; }

.mbtn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 13px; border-radius: var(--radius);
  font-family: var(--font); font-size: .74rem; font-weight: 600;
  cursor: pointer; border: none; transition: all .12s;
}
.mbtn-primary { background: var(--blue); color: #fff; }
.mbtn-primary:hover { background: var(--blue-mid); }
.mbtn-ghost { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }
.mbtn-ghost:hover { background: var(--border); }
.mbtn-danger { background: #fee2e2; color: #dc2626; }
.mbtn-danger:hover { background: #fecaca; }
.mbtn-sm { padding: 4px 9px; font-size: .68rem; }

/* ════════════════════════════════
   TOAST
   ════════════════════════════════ */
#toast {
  position: fixed; bottom: 18px; right: 18px;
  padding: 9px 14px; border-radius: var(--radius);
  font-family: var(--font); font-size: .76rem; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 99999;
  opacity: 0; transform: translateY(6px);
  transition: all .22s; pointer-events: none; max-width: 280px;
  background: var(--navy); color: #fff;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.ok   { background: #064e3b; border-left: 3px solid #22c55e; }
#toast.er   { background: #7f1d1d; border-left: 3px solid #ef4444; }
#toast.in   { background: var(--navy); border-left: 3px solid var(--teal); }

/* ════════════════════════════════
   RESPONSIVE
   ════════════════════════════════ */
@media (max-width: 1400px) {

}

}

<script>
/* ============================================================
   HTML Editor by Gamonal — app.js
   Un archivo JS limpio y modular
   ============================================================ */

'use strict';

/* ════════════════════════════════
   STORAGE
   ════════════════════════════════ */
const Storage = {
  KEY_PROJECTS: 'gam_projects',
  KEY_LOG:      'gam_log',
  KEY_SETTINGS: 'gam_settings',
  KEY_AUTOSAVE: 'gam_autosave',

  get projects() {
    try { return JSON.parse(localStorage.getItem(this.KEY_PROJECTS) || '[]'); }
    catch { return []; }
  },

  saveProject(name, user, html, css, size) {
    const list = this.projects;
    const now = new Date().toISOString();
    const idx = list.findIndex(p => p.name === name && p.user === user);
    const proj = {
      id: idx >= 0 ? list[idx].id : 'p' + Date.now(),
      name, user, html, css, size,
      updatedAt: now,
      createdAt: idx >= 0 ? list[idx].createdAt : now,
    };
    if (idx >= 0) list[idx] = proj; else list.unshift(proj);
    localStorage.setItem(this.KEY_PROJECTS, JSON.stringify(list));
    this.log(user, 'save', name);
    return proj;
  },

  getProject(id) { return this.projects.find(p => p.id === id) || null; },
  deleteProject(id) {
    localStorage.setItem(this.KEY_PROJECTS, JSON.stringify(this.projects.filter(p => p.id !== id)));
  },

  log(user, action, detail = '') {
    const list = this.getLogs();
    list.unshift({ user: user || 'Anónimo', action, detail, ts: new Date().toISOString() });
    if (list.length > 500) list.splice(500);
    localStorage.setItem(this.KEY_LOG, JSON.stringify(list));
  },

  getLogs() {
    try { return JSON.parse(localStorage.getItem(this.KEY_LOG) || '[]'); }
    catch { return []; }
  },

  exportCSV() {
    const logs = this.getLogs();
    if (!logs.length) { App.toast('Sin registros', 'er'); return; }
    const header = 'Fecha,Hora,Usuario,Acción,Detalle\n';
    const rows = logs.map(e => {
      const d = new Date(e.ts);
      return `"${d.toLocaleDateString('es-CL')}","${d.toLocaleTimeString('es-CL')}","${e.user}","${e.action}","${e.detail}"`;
    }).join('\n');
    App.download(new Blob([header + rows], { type: 'text/csv;charset=utf-8;' }), `log-gamonal-${App.timestamp()}.csv`);
  },

  getSetting(key, def = null) {
    try { const s = JSON.parse(localStorage.getItem(this.KEY_SETTINGS) || '{}'); return key in s ? s[key] : def; }
    catch { return def; }
  },
  setSetting(key, val) {
    try { const s = JSON.parse(localStorage.getItem(this.KEY_SETTINGS) || '{}'); s[key] = val; localStorage.setItem(this.KEY_SETTINGS, JSON.stringify(s)); }
    catch {}
  },

  autosave(html, css, size) {
    localStorage.setItem(this.KEY_AUTOSAVE, JSON.stringify({ html, css, size, ts: new Date().toISOString() }));
  },
  getAutosave() {
    try { return JSON.parse(localStorage.getItem(this.KEY_AUTOSAVE) || 'null'); }
    catch { return null; }
  },
};


/* ════════════════════════════════
   UTILIDADES GLOBALES (App)
   ════════════════════════════════ */
const App = {
  user: '',
  selEl: null,
  userCss: '',
  canvasSize: { w: '1180px', h: 'auto', preset: '1180xauto' },
  history: [],
  historyIndex: -1,
  autosaveTimer: null,
  _toastTimer: null,

  /* Helpers DOM */
  qs:  (s, el = document) => el.querySelector(s),
  qsa: (s, el = document) => [...el.querySelectorAll(s)],

  toast(msg, type = 'in') {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  },

  download(blob, filename) {
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: filename,
    });
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  },

  timestamp() {
    return new Date().toISOString().replace(/[:T]/g, '-').slice(0, 16);
  },

  openModal(id)  { document.getElementById(id)?.classList.add('open'); },
  closeModal(id) { document.getElementById(id)?.classList.remove('open'); },

  /* Canvas size helpers */
  parsePx(val) {
    const n = parseInt(String(val || '').replace('px', ''), 10);
    return Number.isFinite(n) && n > 0 ? n : '';
  },

  toCss(val) {
    const raw = String(val ?? '').trim();
    if (!raw || raw === 'auto') return 'auto';
    if (/^[\d.]+$/.test(raw)) return raw + 'px';
    return raw;
  },

  getCanvasSize() {
    const canvas = document.getElementById('canvas');
    return {
      w: canvas?.style.width || this.canvasSize.w || '100%',
      h: canvas?.style.height || this.canvasSize.h || 'auto',
      preset: this.canvasSize.preset || 'custom',
    };
  },

  setCanvasSize(w = '100%', h = 'auto', preset = 'custom', opts = { history: true }) {
    const canvas = document.getElementById('canvas');
    if (!canvas) return;
    const width  = this.toCss(w)  || '100%';
    const height = this.toCss(h)  || 'auto';
    this.canvasSize = { w: width, h: height, preset };
    canvas.style.setProperty('width', width, 'important');
    canvas.style.setProperty('max-width', 'none', 'important');
    if (height === 'auto') {
      canvas.style.height = '';
      canvas.style.minHeight = '420px';
      canvas.style.overflow = '';
    } else {
      canvas.style.height = height;
      canvas.style.minHeight = height;
      canvas.style.overflow = 'hidden';
    }
    this.qs('.vb')?.classList.remove('on');
    this.syncCanvasSizeControls();
    Rulers.update();
    Storage.setSetting('canvasSize', this.canvasSize);
    if (opts.history) History.push();
  },

  syncCanvasSizeControls() {
    const preset = document.getElementById('canvasPreset');
    const wi = document.getElementById('canvasW');
    const hi = document.getElementById('canvasH');
    const size = this.getCanvasSize();
    if (preset) preset.value = this.canvasSize.preset || 'custom';
    if (wi) wi.value = this.parsePx(size.w) || '';
    if (hi) hi.value = size.h === 'auto' ? '' : (this.parsePx(size.h) || '');
  },

  applyCanvasPreset(value) {
    if (value === 'custom') { this.applyCustomCanvasSize(); return; }
    if (value === 'auto')   { this.setCanvasSize('100%', 'auto', 'auto'); return; }
    const [w, h] = value.split('x');
    this.setCanvasSize(w, h === 'auto' ? 'auto' : h, value);
  },

  applyCustomCanvasSize() {
    const w = parseInt(document.getElementById('canvasW')?.value, 10);
    const h = parseInt(document.getElementById('canvasH')?.value, 10);
    if (!Number.isFinite(w) || w <= 0) { this.toast('Escribe un ancho válido', 'er'); return; }
    this.setCanvasSize(w, Number.isFinite(h) && h > 0 ? h : 'auto', 'custom');
  },

  hasContent() {
    const canvas = document.getElementById('canvas');
    return [...(canvas?.children || [])].some(el => !(el.classList.contains('drop-zone') && el.dataset.dropzone === 'root'));
  },

  scheduleAutosave() {
    Autosave.setSaving();
    clearTimeout(this.autosaveTimer);
    this.autosaveTimer = setTimeout(() => {
      try {
        Storage.autosave(
          document.getElementById('canvas').innerHTML,
          this.userCss,
          this.getCanvasSize()
        );
        Autosave.setSaved();
      } catch {}
    }, 2500);
  },
};


/* ════════════════════════════════
   HISTORIAL
   ════════════════════════════════ */
const History = {
  MAX: 50,

  push() {
    const canvas = document.getElementById('canvas');
    const snap = canvas.innerHTML;
    if (App.history[App.historyIndex] === snap) {
      App.scheduleAutosave(); Code.update(); Layers.update();
      return;
    }
    App.history = App.history.slice(0, App.historyIndex + 1);
    App.history.push(snap);
    if (App.history.length > this.MAX) App.history.shift();
    App.historyIndex = App.history.length - 1;
    App.scheduleAutosave(); Code.update(); Layers.update();
  },

  undo() {
    if (App.historyIndex <= 0) return;
    App.historyIndex--;
    document.getElementById('canvas').innerHTML = App.history[App.historyIndex];
    Canvas.rebind(); Selection.clear(); Code.update(); Layers.update();
  },

  redo() {
    if (App.historyIndex >= App.history.length - 1) return;
    App.historyIndex++;
    document.getElementById('canvas').innerHTML = App.history[App.historyIndex];
    Canvas.rebind(); Selection.clear(); Code.update(); Layers.update();
  },
};


/* ════════════════════════════════
   AUTOSAVE UI
   ════════════════════════════════ */
const Autosave = {
  setSaving() {
    const dot = document.getElementById('asDot');
    const txt = document.getElementById('asTxt');
    if (dot) dot.classList.add('saving');
    if (txt) txt.textContent = 'Guardando…';
  },
  setSaved() {
    const dot = document.getElementById('asDot');
    const txt = document.getElementById('asTxt');
    if (dot) dot.classList.remove('saving');
    if (txt) txt.textContent = 'Autoguardado';
  },
};


/* ════════════════════════════════
   REGLAS / RULERS
   ════════════════════════════════ */
const Rulers = {
  buildRuler(target, visualSize, axis, logicalSize = visualSize) {
    if (!target) return;
    const len = Math.max(0, Math.round(logicalSize));
    const step = len <= 420 ? 50 : len <= 900 ? 100 : 200;
    let html = '';
    for (let n = 0; n <= len; n += step) {
      const major = n % (step * 2) === 0;
      const pos = len ? Math.min(100, n / len * 100) : 0;
      html += `<span class="dim-tick ${major ? 'major' : ''}" style="${axis === 'x' ? 'left' : 'top'}:${pos}%"></span>`;
      if (major) html += `<span class="dim-label" style="${axis === 'x' ? 'left' : 'top'}:${pos}%">${n}</span>`;
    }
    target.innerHTML = html;
  },

  fitCanvas() {
    const canvas = document.getElementById('canvas');
    const area   = document.getElementById('canvas-area');
    if (!canvas || !area) return 1;
    const logical = App.parsePx(App.canvasSize.w) || canvas.scrollWidth || 1180;
    const areaStyle = getComputedStyle(area);
    const padX = (parseFloat(areaStyle.paddingLeft) || 0) + (parseFloat(areaStyle.paddingRight) || 0);
    const available = Math.max(280, area.clientWidth - padX - 20);
    const scale = logical > available ? Math.max(.2, available / logical) : 1;
    area.style.setProperty('--canvas-scale', String(Number(scale.toFixed(4))));
    canvas.style.zoom = String(Number(scale.toFixed(4)));
    return scale;
  },

  update() {
    const canvas = document.getElementById('canvas');
    const top    = document.getElementById('dimTop');
    const left   = document.getElementById('dimLeft');
    const badge  = document.getElementById('viewBadge');
    if (!canvas || !top || !left) return;

    const size = App.getCanvasSize();
    const logW = App.parsePx(size.w) || canvas.scrollWidth || 1180;
    const logH = size.h === 'auto'
      ? (canvas.scrollHeight || canvas.offsetHeight || 420)
      : (App.parsePx(size.h) || canvas.scrollHeight || 420);

    const scale = this.fitCanvas();
    const visW  = Math.round(logW * scale);
    const visH  = Math.round(logH * scale);

    top.style.left  = canvas.offsetLeft + 'px';
    top.style.width = visW + 'px';
    left.style.top    = canvas.offsetTop + 'px';
    left.style.height = visH + 'px';

    this.buildRuler(top,  visW, 'x', logW);
    this.buildRuler(left, visH, 'y', logH);

    if (badge) {
      const preset = size.preset;
      const label = preset === 'auto' ? 'Ancho disponible'
        : preset === 'custom' ? 'Personalizado'
        : preset.replace('x', ' × ');
      badge.textContent = `${label} — ${logW} × ${logH} px` + (scale < .999 ? ` — ${Math.round(scale * 100)}%` : '');
    }
  },
};


/* ════════════════════════════════
   SELECTION
   ════════════════════════════════ */
const Selection = {
  clear() {
    if (App.selEl) {
      App.selEl.classList.remove('el-selected', 'el-hovered');
      App.selEl = null;
    }
    Toolbar.hide();
    Props.showEmpty();
    Code.fillSelected(null);
  },

  select(el) {
    if (App.selEl && App.selEl !== el) {
      App.selEl.classList.remove('el-selected', 'el-hovered');
    }
    App.selEl = el;
    this.ensureId(el);
    el.classList.add('el-selected');
    Toolbar.show(el);
    Props.render(el);
    Layers.update();
    Code.fillSelected(el);
    Code.update();
  },

  ensureId(el) {
    if (!el.dataset.cid) {
      el.dataset.cid = 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }
    return el.dataset.cid;
  },

  getLabel(el) {
    if (!el) return 'Sin selección';
    if (el.dataset?.label) return el.dataset.label;
    if (el.tagName === 'IMG') return 'Imagen';
    if (el.tagName === 'IFRAME') return 'Embed';
    if (el.tagName === 'A') return 'Enlace / CTA';
    return el.tagName.toLowerCase();
  },

  getMetrics(el) {
    if (!el) return '';
    const r = el.getBoundingClientRect();
    return `${Math.round(r.width)} × ${Math.round(r.height)} px`;
  },

  getRoot(el = App.selEl) {
    const canvas = document.getElementById('canvas');
    if (!el || !canvas || el === canvas) return null;
    const sel = '[data-label],img,iframe,a,hr,p,h1,h2,h3,h4,li,section,header,footer,figure,article';
    if (el.matches?.(sel)) return el;
    return el.closest?.(sel) || null;
  },
};


/* ════════════════════════════════
   TOOLBAR FLOTANTE
   ════════════════════════════════ */
const Toolbar = {
  show(el) {
    const tb = document.getElementById('eltb');
    const r  = el.getBoundingClientRect();
    tb.style.top  = (r.top - 38) + 'px';
    tb.style.left = r.left + 'px';
    tb.classList.add('show');
  },
  hide() { document.getElementById('eltb').classList.remove('show'); },
};


/* ════════════════════════════════
   CANVAS — drag, drop, bind
   ════════════════════════════════ */
const Canvas = {

  init() {
    const canvas = document.getElementById('canvas');
    canvas.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = window._dragEl ? 'move' : 'copy';
      /* Highlight deepest valid drop target */
      const zone = this._getDropTarget(e.target);
      document.querySelectorAll('.drag-over').forEach(el => {
        if (el !== zone) el.classList.remove('drag-over');
      });
      if (zone) zone.classList.add('drag-over');
    });

    canvas.addEventListener('dragleave', e => {
      if (!canvas.contains(e.relatedTarget)) {
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      }
    });

    canvas.addEventListener('drop', e => {
      e.preventDefault();
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      const zone = this._getDropTarget(e.target);
      const dest = zone || canvas;

      if (window._dragEl) {
        const root = this._getBlockRoot(window._dragEl);
        if (!root || dest === root || root.contains(dest)) return;
        dest.querySelector(':scope > .slot-hint')?.remove();
        dest.appendChild(root);
        this._bindTree(root);
        History.push(); Layers.update();
        return;
      }
      const html = e.dataTransfer.getData('text/plain');
      if (html) this.insertBlock(html, dest);
    });

    this.rebind();
  },

  /* Find the best drop destination from a target element */
  _getDropTarget(el) {
    const canvas = document.getElementById('canvas');
    /* Walk up from el to find a droppable container */
    let node = el;
    while (node && node !== canvas) {
      /* Allow dropping into inner-drop zones */
      if (node.classList && node.classList.contains('inner-drop')) return node;
      /* Allow dropping into any direct canvas child that is a container */
      if (node.parentElement === canvas) {
        const tag = node.tagName && node.tagName.toLowerCase();
        if (['div','section','article','main','aside','header','footer'].includes(tag)) return node;
      }
      node = node.parentElement;
    }
    return canvas;
  },

  /* Get the top-level block root of an element (for moving) */
  _getBlockRoot(el) {
    const canvas = document.getElementById('canvas');
    if (!el || el === canvas) return null;
    let node = el;
    while (node.parentElement && node.parentElement !== canvas) {
      node = node.parentElement;
    }
    return node.parentElement === canvas ? node : null;
  },

  rebind() {
    const canvas = document.getElementById('canvas');
    /* Bind ALL elements recursively */
    this._bindTree(canvas);
  },

  _bindTree(root) {
    const canvas = document.getElementById('canvas');
    /* Make ALL container elements droppable */
    const containers = root.querySelectorAll('div,section,article,main,aside,header,footer,td,th,li,blockquote');
    containers.forEach(el => this._makeDroppable(el));
    if (['DIV','SECTION','ARTICLE','MAIN','ASIDE','HEADER','FOOTER'].includes(root.tagName)) {
      this._makeDroppable(root);
    }
    /* Bind interaction to ALL elements */
    const all = root === canvas
      ? [...canvas.children]
      : [root, ...root.querySelectorAll('*')];
    all.forEach(el => this._bindEl(el));
  },

  _makeDroppable(el) {
    if (el._droppable) return;
    el._droppable = true;
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = window._dragEl ? 'move' : 'copy';
      document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', e => {
      if (!el.contains(e.relatedTarget)) el.classList.remove('drag-over');
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('drag-over');
      el.querySelector(':scope > .slot-hint')?.remove();

      if (window._dragEl) {
        const root = this._getBlockRoot(window._dragEl);
        /* Don't drop into self */
        if (!root || el === root || root.contains(el)) return;
        el.appendChild(root);
        this._bindTree(root);
        History.push(); Layers.update();
        return;
      }
      const html = e.dataTransfer.getData('text/plain');
      if (html) this.insertBlock(html, el);
    });
  },

  _bindEl(el) {
    if (el._bound) return;
    el._bound = true;

    el.addEventListener('mouseenter', e => {
      if (el === App.selEl) return;
      el.classList.add('el-hovered');
      e.stopPropagation();
    });
    el.addEventListener('mouseleave', () => el.classList.remove('el-hovered'));

    el.addEventListener('click', e => {
      e.stopPropagation();
      Selection.select(el);
    });

    el.addEventListener('dblclick', e => {
      e.stopPropagation();
      if (el.contentEditable === 'true') { el.focus(); return; }
      const ce = el.querySelector('[contenteditable="true"]');
      if (ce) { ce.focus(); return; }
      /* Make element editable on double-click */
      if (['P','H1','H2','H3','H4','H5','SPAN','A','LI','BLOCKQUOTE','CITE','TD','TH'].includes(el.tagName)) {
        el.contentEditable = 'true';
        el.focus();
      }
    });

    el.addEventListener('blur', () => { History.push(); }, true);
    if (el.isContentEditable) {
      el.addEventListener('input', () => { Code.update(); App.scheduleAutosave(); }, true);
    }

    /* Make draggable only if it's a meaningful block */
    const isDraggable = el.dataset && el.dataset.label;
    if (isDraggable) {
      el.draggable = true;
      el.addEventListener('dragstart', e => {
        window._dragEl = el;
        e.stopPropagation();
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', '');
        setTimeout(() => { el.style.opacity = '.4'; document.body.classList.add('dragging'); }, 0);
      });
      el.addEventListener('dragend', () => {
        el.style.opacity = '';
        window._dragEl = null;
        document.body.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(x => x.classList.remove('drag-over'));
      });
    }
  },

  insertBlock(html, dest = null) {
    const canvas = document.getElementById('canvas');
    const target = dest || canvas;
    target.querySelector(':scope > .slot-hint')?.remove();
    const tmp = document.createElement('div');
    tmp.innerHTML = html.trim();
    const node = tmp.firstElementChild;
    if (!node) return;
    target.appendChild(node);
    this._bindTree(node);
    History.push();
    Selection.select(node);
    App.toast('Elemento añadido', 'ok');
  },

  deleteSelected() {
    const el = App.selEl;
    if (!el) return;
    const root = this._getBlockRoot(el) || el;
    if (!confirm('¿Eliminar este elemento?')) return;
    root.remove();
    Selection.clear();
    document.getElementById('ctxMenu').classList.remove('show');
    History.push(); Layers.update(); Code.update();
    App.toast('Eliminado', 'in');
  },

  duplicate() {
    const el = App.selEl;
    if (!el || !el.parentNode) return;
    const clone = el.cloneNode(true);
    /* Reset bound flags */
    clone._bound = false; clone._droppable = false; clone._dragBound = false;
    clone.querySelectorAll('*').forEach(n => { n._bound = false; n._droppable = false; });
    el.parentNode.insertBefore(clone, el.nextSibling);
    this._bindTree(clone);
    History.push(); Selection.select(clone); Layers.update();
    App.toast('Duplicado ✓', 'ok');
  },

  move(dir) {
    const el = App.selEl;
    if (!el || !el.parentNode) return;
    const siblings = [...el.parentNode.children];
    const idx = siblings.indexOf(el);
    const next = siblings[idx + dir];
    if (!next) return;
    if (dir < 0) el.parentNode.insertBefore(el, next);
    else el.parentNode.insertBefore(next, el);
    History.push(); Layers.update();
    App.toast(dir < 0 ? 'Subido ✓' : 'Bajado ✓', 'ok');
  },

  clear(doConfirm = true) {
    const canvas = document.getElementById('canvas');
    if (doConfirm && App.hasContent() && !confirm('¿Limpiar todo el lienzo?')) return false;
    canvas.innerHTML = '';
    App.userCss = '';
    const cssBox = document.getElementById('code-css');
    if (cssBox) { cssBox.value = ''; cssBox.dataset.dirty = '0'; }
    document.getElementById('gamonalUserCss')?.remove();
    Selection.clear();
    Layers.update(); Code.update();
    try { localStorage.removeItem(Storage.KEY_AUTOSAVE); } catch {}
    App.setCanvasSize('1180', 'auto', '1180xauto', { history: false });
    App.history = []; App.historyIndex = -1;
    History.push(); Rulers.update();
    App.toast('Lienzo limpio', 'ok');
    return true;
  },
};



const Layers = {
  update() {
    const list   = document.getElementById('layersList');
    const canvas = document.getElementById('canvas');
    if (!list || !canvas) return;
    const children = [...canvas.children].filter(el => !el.classList.contains('drop-zone'));
    if (!children.length) {
      list.innerHTML = '<div style="padding:14px;font-size:.72rem;color:var(--text3)">Sin elementos</div>';
      return;
    }
    list.innerHTML = children.map((el, i) => {
      const lbl = el.dataset.label || el.tagName.toLowerCase();
      return `<div class="layer ${el === App.selEl ? 'on' : ''}" data-idx="${i}" role="button" tabindex="0">
        <span class="layer-tag">${el.tagName.toLowerCase()}</span>
        <span>${lbl}</span>
      </div>`;
    }).join('');
    list.querySelectorAll('[data-idx]').forEach(row => {
      const pick = () => { const idx = +row.dataset.idx; if (children[idx]) Selection.select(children[idx]); };
      row.addEventListener('click', pick);
      row.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); pick(); } });
    });
  },
};


/* ════════════════════════════════
   CÓDIGO
   ════════════════════════════════ */
const Code = {
  setTA(id, value) {
    const el = document.getElementById(id);
    if (!el || document.activeElement === el || el.dataset.dirty === '1') return;
    el.value = value || '';
  },

  markDirty(id)  { const el = document.getElementById(id); if (el) el.dataset.dirty = '1'; },
  clearDirty(id) { const el = document.getElementById(id); if (el) el.dataset.dirty = '0'; },

  getCanvasHTML() {
    const canvas  = document.getElementById('canvas');
    const selEl   = App.selEl;
    if (!selEl) return canvas.innerHTML.trim();
    const cid     = Selection.ensureId(selEl);
    const clone   = canvas.cloneNode(true);
    const selNode = clone.querySelector(`[data-cid="${cid}"]`);
    if (selNode) {
      selNode.before(document.createComment(` INICIO: ${Selection.getLabel(selEl)} `));
      selNode.after(document.createComment(' FIN '));
    }
    clone.querySelectorAll('[data-cid]').forEach(n => n.removeAttribute('data-cid'));
    return clone.innerHTML.trim();
  },

  cleanNode(node) {
    if (!node) return '';
    const clone = node.cloneNode(true);
    clone.classList?.remove('el-selected', 'el-hovered');
    clone.removeAttribute('data-cid');
    clone.querySelectorAll('*').forEach(n => {
      n.classList?.remove('el-selected', 'el-hovered');
      n.removeAttribute('data-cid');
    });
    return clone.outerHTML;
  },

  getNodeCSS(node) {
    if (!node) return '';
    const style = node.getAttribute('style') || '';
    return style ? `${node.tagName.toLowerCase()} {\n  ${style.replace(/;\s*/g, ';\n  ').trim()}\n}` : '(sin estilos inline)';
  },

  fillSelected(el) {
    this.setTA('code-sel-html', el ? this.cleanNode(el) : '');
    this.setTA('code-sel-css',  el ? this.getNodeCSS(el) : '');
  },

  update() {
    this.setTA('code-html', this.getCanvasHTML());
    this.setTA('code-css',  App.userCss);
    this.fillSelected(App.selEl);
    Rulers.update();
  },

  applyUserCSS(silent = false) {
    App.userCss = document.getElementById('code-css')?.value || '';
    let style = document.getElementById('gamonalUserCss');
    if (!style) { style = document.createElement('style'); style.id = 'gamonalUserCss'; document.head.appendChild(style); }
    // Scope CSS to #canvas
    style.textContent = App.userCss.replace(/(^|})([^@{}][^{}]*)\{/g, (m, brace, selectors) => {
      const scoped = selectors.split(',').map(s => {
        const t = s.trim();
        if (!t) return t;
        if (/^(html|body)$/i.test(t)) return '#canvas';
        if (t.startsWith('#canvas')) return t;
        return '#canvas ' + t;
      }).join(', ');
      return brace + scoped + '{';
    });
    this.clearDirty('code-css');
    if (!silent) App.toast('CSS aplicado', 'ok');
  },

  extractBodyHTML(raw) {
    const val = String(raw || '').trim();
    if (!val) return '';
    if (/<body[\s>]/i.test(val)) {
      const doc = new DOMParser().parseFromString(val, 'text/html');
      return doc.body.innerHTML.trim();
    }
    return val.replace(/<!--\s*INICIO[\s\S]*?-->/g, '').replace(/<!--\s*FIN\s*-->/g, '').trim();
  },

  applyFullHTML() {
    const html = this.extractBodyHTML(document.getElementById('code-html')?.value || '');
    this.clearDirty('code-html'); this.clearDirty('code-sel-html'); this.clearDirty('code-sel-css');
    const canvas = document.getElementById('canvas');
    canvas.innerHTML = html;
    this.applyUserCSS(true);
    Selection.clear(); Canvas.rebind(); Canvas.bindDropZones(canvas);
    Layers.update(); this.update(); Rulers.update(); History.push();
    App.toast('HTML aplicado', 'ok');
  },

  applySelectedHTML() {
    if (!App.selEl) { App.toast('Selecciona un componente primero', 'er'); return; }
    const html = this.extractBodyHTML(document.getElementById('code-sel-html')?.value || '');
    if (!html) { App.toast('HTML vacío', 'er'); return; }
    const tmp  = document.createElement('template');
    tmp.innerHTML = html;
    const next = tmp.content.firstElementChild;
    if (!next) { App.toast('HTML inválido', 'er'); return; }
    this.clearDirty('code-sel-html');
    App.selEl.replaceWith(next);
    Canvas.bindEl(next);
    App.qsa('[contenteditable],[data-label],img,a,iframe', next).forEach(el => Canvas.bindEl(el));
    Canvas.bindDropZones(next);
    Selection.select(next); History.push(); this.update();
    App.toast('HTML del componente aplicado', 'ok');
  },

  applySelectedCSS() {
    if (!App.selEl) { App.toast('Selecciona un componente primero', 'er'); return; }
    let css = document.getElementById('code-sel-css')?.value || '';
    const match = css.match(/\{([\s\S]*)\}/);
    css = (match ? match[1] : css).replace(/\/\*[\s\S]*?\*\//g, '').trim();
    this.clearDirty('code-sel-css');
    App.selEl.style.cssText = css;
    History.push(); Props.render(App.selEl); this.update(); Rulers.update();
    App.toast('CSS del componente aplicado', 'ok');
  },

  readFile(inputId, targetId, kind) {
    const input = document.getElementById(inputId);
    const file  = input?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const ta = document.getElementById(targetId);
      if (!ta) return;
      ta.value = String(reader.result || '');
      this.markDirty(targetId);
      if (kind === 'html') this.applyFullHTML();
      if (kind === 'css')  this.applyUserCSS();
      input.value = '';
    };
    reader.onerror = () => App.toast('No se pudo leer el archivo', 'er');
    reader.readAsText(file, 'UTF-8');
  },

  init() {
    const bind = (id, fn) => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.addEventListener('click', fn);
    };
    bind('btnApplyHTML',    () => this.applyFullHTML());
    bind('btnApplyCSS',     () => this.applyUserCSS());
    bind('btnApplyBoth',    () => { this.applyFullHTML(); this.applyUserCSS(true); App.toast('HTML y CSS aplicados', 'ok'); });
    bind('btnApplySelHTML', () => this.applySelectedHTML());
    bind('btnApplySelCSS',  () => this.applySelectedCSS());
    bind('btnImportHTML',   () => document.getElementById('fileHTML')?.click());
    bind('btnImportCSS',    () => document.getElementById('fileCSS')?.click());

    document.getElementById('fileHTML')?.addEventListener('change', () => this.readFile('fileHTML', 'code-html', 'html'));
    document.getElementById('fileCSS')?.addEventListener('change',  () => this.readFile('fileCSS',  'code-css',  'css'));

    ['code-html', 'code-css', 'code-sel-html', 'code-sel-css'].forEach(id => {
      const ta = document.getElementById(id);
      if (!ta) return;
      ta.addEventListener('input', () => {
        this.markDirty(id);
        if (id === 'code-css') {
          clearTimeout(window._cssLiveT);
          window._cssLiveT = setTimeout(() => { this.applyUserCSS(true); App.scheduleAutosave(); }, 200);
        }
      });
      ta.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          if (id === 'code-html')     this.applyFullHTML();
          if (id === 'code-css')      this.applyUserCSS();
          if (id === 'code-sel-html') this.applySelectedHTML();
          if (id === 'code-sel-css')  this.applySelectedCSS();
        }
        if (e.key === 'Tab') {
          e.preventDefault();
          const s = ta.selectionStart, en = ta.selectionEnd;
          ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(en);
          ta.selectionStart = ta.selectionEnd = s + 2;
        }
      });
    });
  },
};

const Props = {

  getStyleTarget() {
    const el = App.selEl;
    if (!el) return null;
    const inlineTags = ['SPAN','A','STRONG','EM','B','I','U','BR'];
    if (inlineTags.includes(el.tagName) || el.isContentEditable) {
      const block = el.closest('[data-label]') || el.parentElement;
      return block && block !== document.getElementById('canvas') ? block : el;
    }
    return el;
  },

  showEmpty() {
    document.getElementById('noSel').style.display = '';
    document.getElementById('styleProps').style.display = 'none';
  },

  rgb2hex(rgb) {
    if (!rgb || rgb === 'transparent' || rgb === 'initial' || rgb === '') return '#ffffff';
    if (rgb.startsWith('#')) return rgb.length === 4
      ? '#' + rgb[1]+rgb[1]+rgb[2]+rgb[2]+rgb[3]+rgb[3] : rgb;
    const m = rgb.match(/\d+/g);
    if (!m || m.length < 3) return '#ffffff';
    return '#' + m.slice(0,3).map(x => parseInt(x).toString(16).padStart(2,'0')).join('');
  },

  esc: v => String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'),

  applyToEl(el, prop, value) {
    if (!el) return;
    el.style[prop.replace(/-([a-z])/g, (_, c) => c.toUpperCase())] = value;
    History.push(); Rulers.update();
  },

  renderHTML(el, target, textEl, img, cta) {
    const st = target.style;
    const cs = window.getComputedStyle(target);

    const tcs = window.getComputedStyle(textEl);
    const isTarget = target === el;
    const label = el.dataset && el.dataset.label ? el.dataset.label : el.tagName.toLowerCase();

    const fontOpts = ['Roboto, Arial, sans-serif','Arial, sans-serif','Georgia, serif','Tahoma, sans-serif','Verdana, sans-serif','Helvetica Neue, sans-serif'];
    const fontSel = fontOpts.map(function(f) {
      const name = f.split(',')[0].trim().replace(/'/g,'');
      const sel = (tst.fontFamily||tcs.fontFamily||'').includes(f.split(',')[0].trim()) ? 'selected' : '';
      return '<option value="' + f + '" ' + sel + '>' + name + '</option>';
    }).join('');

    const weightOpts = [['300','Light'],['400','Normal'],['500','Medium'],['600','Semi'],['700','Bold'],['800','Extra']];
    const weightSel = weightOpts.map(function(w) {
      return '<option value="' + w[0] + '" ' + ((tst.fontWeight||tcs.fontWeight)===w[0]?'selected':'') + '>' + w[1] + '</option>';
    }).join('');

    const fitOpts = [['cover','Cover — recortar'],['contain','Contain — ver todo'],['fill','Fill — estirar'],['none','None — real']];
    const fitSel = img ? fitOpts.map(function(f) {
      return '<option value="' + f[0] + '" ' + ((img.style.objectFit||'cover')===f[0]?'selected':'') + '>' + f[1] + '</option>';
    }).join('') : '';

    const bgsizeOpts = [['cover','Cover'],['contain','Contain'],['auto','Auto'],['100% 100%','Estirar']];
    const bgsizeSel = bgsizeOpts.map(function(b) {
      return '<option value="' + b[0] + '" ' + (st.backgroundSize===b[0]?'selected':'') + '>' + b[1] + '</option>';
    }).join('');

    let html = '<div class="sec"><div class="sec-title">Selección</div><div class="sec-body">'
      + '<div class="prop"><label>Elemento</label><input type="text" value="' + this.esc(label + ' · ' + el.tagName.toLowerCase()) + '" readonly/></div>';
    if (!isTarget) {
      html += '<div class="prop"><label style="color:var(--blue);font-size:.65rem;">⚠ Fondo/borde se aplica al bloque contenedor</label>'
        + '<button class="btn-code btn-ghost" style="width:100%;margin-top:4px;" id="btnSelParent">→ Seleccionar bloque</button></div>';

      + '</div></div>';

      + '<div class="prop"><label>Color de fondo</label><input type="color" data-b="background-color" value="' + this.rgb2hex(st.backgroundColor||cs.backgroundColor) + '"/></div>'

      + '<div class="prop-row"><div class="prop"><label>Radio (px)</label><input type="number" data-b-px="border-radius" value="' + (parseInt(st.borderRadius)||0) + '"/></div>'

      + '<div class="prop-row"><div class="prop"><label>Margen ↑</label><input type="text" data-b="margin-top" value="' + (st.marginTop||'0') + '"/></div>'
      + '<div class="prop"><label>Margen ↓</label><input type="text" data-b="margin-bottom" value="' + (st.marginBottom||'0') + '"/></div></div>'
      + '<div class="prop-row"><div class="prop"><label>Relleno ↑</label><input type="text" data-b="padding-top" value="' + (st.paddingTop||'0') + '"/></div>'
      + '<div class="prop"><label>Relleno ↓</label><input type="text" data-b="padding-bottom" value="' + (st.paddingBottom||'0') + '"/></div></div>'
      + '<div class="prop-row"><div class="prop"><label>Relleno ←</label><input type="text" data-b="padding-left" value="' + (st.paddingLeft||'0') + '"/></div>'
      + '<div class="prop"><label>Relleno →</label><input type="text" data-b="padding-right" value="' + (st.paddingRight||'0') + '"/></div></div>'
      + '</div></div>';

    // IMAGE
    if (img) {
      html += '<div class="sec"><div class="sec-title">Imagen</div><div class="sec-body">'
        + '<div class="prop"><label>URL</label><input type="text" data-i="src" value="' + this.esc(img.getAttribute('src')||'') + '" placeholder="https://..."/></div>'
        + '<div class="prop"><label>Alt</label><input type="text" data-i="alt" value="' + this.esc(img.alt||'') + '"/></div>'
        + '<div class="prop-row"><div class="prop"><label>Ancho</label><input type="text" data-i="w" value="' + (img.style.width||'100%') + '"/></div>'
        + '<div class="prop"><label>Alto</label><input type="text" data-i="h" value="' + (img.style.height||'auto') + '"/></div></div>'
        + '<div class="prop"><label>Object-fit</label><select data-i="fit">' + fitSel + '</select></div>'
        + '<div class="prop"><label>Alineación</label><select data-i="align"><option value="left">← Izq</option><option value="center">↔ Centro</option><option value="right">→ Der</option></select></div>'
        + '<div class="prop"><label>Radio borde (px)</label><input type="number" data-i="radius" value="' + (parseInt(img.style.borderRadius)||0) + '" min="0"/></div>'

        + '<div class="prop"><label>Texto</label><input type="color" data-c="color" value="' + this.rgb2hex(cta.style.color||ctaCS.color) + '"/></div></div>'
        + '<div class="prop"><label>Forma</label><select data-c="shape"><option value="0px">Recto</option><option value="6px">Suave</option><option value="12px">Redondo</option><option value="999px">Píldora</option></select></div>'
        + '</div></div>';
    }

    // OTHERS
    html += '<div class="sec"><div class="sec-title">Otros</div><div class="sec-body">'
      + '<div class="prop-row"><div class="prop"><label>Opacidad</label><input type="number" step=".05" min="0" max="1" data-b="opacity" value="' + (parseFloat(st.opacity)||1) + '"/></div>'
      + '<div class="prop"><label>Z-index</label><input type="number" data-b="z-index" value="' + (parseInt(st.zIndex)||0) + '"/></div></div>'
      + '</div></div>';

    return html;
  },

  render(el) {
    document.getElementById('noSel').style.display = 'none';
    const props = document.getElementById('styleProps');
    props.style.display = '';
    if (!el) { this.showEmpty(); return; }

    const target = this.getStyleTarget();
    const img = el.tagName === 'IMG' ? el : el.querySelector('img');
    const cta = el.tagName === 'A' ? el : el.querySelector('a[role="button"],a.email-cta,a');

    props.innerHTML = this.renderHTML(el, target, el, img, cta);

    /* Block props (data-b, data-b-px, data-b-action) → target element */
    props.querySelectorAll('[data-b]').forEach(ctrl => {
      ctrl.addEventListener('change', () => { this.applyToEl(target, ctrl.dataset.b, ctrl.value); this.render(App.selEl); });
    });
    props.querySelectorAll('[data-b-px]').forEach(ctrl => {
      ctrl.addEventListener('change', () => { this.applyToEl(target, ctrl.dataset.bPx, ctrl.value + 'px'); this.render(App.selEl); });
    });
    props.querySelectorAll('[data-b-action]').forEach(ctrl => {
      ctrl.addEventListener('change', () => {
        if (ctrl.dataset.bAction === 'bg-img') {
          const v = ctrl.value.trim();
          target.style.backgroundImage = v ? 'url(' + v + ')' : 'none';
          History.push();
        }
      });
    });

    /* Text props (data-t, data-t-px) → textEl (selEl itself) */
    props.querySelectorAll('[data-t]').forEach(ctrl => {
      ctrl.addEventListener('change', () => { this.applyToEl(el, ctrl.dataset.t, ctrl.value); this.render(App.selEl); });
    });
    props.querySelectorAll('[data-t-px]').forEach(ctrl => {
      ctrl.addEventListener('change', () => { this.applyToEl(el, ctrl.dataset.tPx, ctrl.value + 'px'); this.render(App.selEl); });
    });

    /* Image props (data-i) → img element */
    if (img) {
      props.querySelectorAll('[data-i]').forEach(ctrl => {
        ctrl.addEventListener('change', () => {
          const a = ctrl.dataset.i;
          if (a === 'src')    { img.setAttribute('src', ctrl.value); History.push(); }
          if (a === 'alt')    { img.alt = ctrl.value; }
          if (a === 'w')      { img.style.width = ctrl.value; img.style.maxWidth = '100%'; History.push(); }
          if (a === 'h')      { img.style.height = ctrl.value; History.push(); }
          if (a === 'fit')    { img.style.objectFit = ctrl.value; History.push(); }
          if (a === 'radius') { img.style.borderRadius = ctrl.value + 'px'; History.push(); }
          if (a === 'align')  {
            img.style.display = 'block';
            img.style.marginLeft  = (ctrl.value === 'center' || ctrl.value === 'right')  ? 'auto' : '0';
            img.style.marginRight = (ctrl.value === 'center' || ctrl.value === 'left')   ? 'auto' : '0';
            History.push();
          }
        });
      });
    }

    /* CTA props (data-c) → cta element */
    if (cta) {
      props.querySelectorAll('[data-c]').forEach(ctrl => {
        ctrl.addEventListener('change', () => {
          const a = ctrl.dataset.c;
          if (a === 'text')  { cta.textContent = ctrl.value; History.push(); }
          if (a === 'href')  { cta.setAttribute('href', ctrl.value); }
          if (a === 'bg')    { cta.style.backgroundColor = ctrl.value; History.push(); }
          if (a === 'color') { cta.style.color = ctrl.value; History.push(); }
          if (a === 'shape') { cta.style.borderRadius = ctrl.value; History.push(); }
        });
      });
    }

    /* Select parent button */
    document.getElementById('btnSelParent') && document.getElementById('btnSelParent').addEventListener('click', function() {
      if (target && target !== App.selEl) Selection.select(target);
    });
  },
};

  getIcon(label) {
    return this.icons[label] || '<svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>';
  },

  build() {
    const wrap = document.getElementById('blklist');
    wrap.innerHTML = '';
    const cats = [...new Set(this.list.map(b => b.cat))];
    const catIcons = { Layout:'LAY', Texto:'TXT', Media:'IMG', CTA:'CTA', Email:'✉', Display:'DSP', LinkedIn:'LIN', Elem:'MÁS' };
    const catNames = { Layout:'Layout', Texto:'Texto', Media:'Media', CTA:'CTA', Email:'Email', Display:'Display', LinkedIn:'LinkedIn', Elem:'Más' };

    const tabs = document.createElement('div');
    tabs.className = 'block-tabs'; /* 4x2 grid */
    const grid = document.createElement('div');
    grid.className = 'block-grid';

    const render = cat => {
      grid.innerHTML = '';
      this.list.filter(b => b.cat === cat).forEach(b => {
        const el = document.createElement('div');
        el.className = 'blk';
        el.draggable = true;
        el.innerHTML = `<span class="blk-icon">${this.getIcon(b.label)}</span><span class="blk-label">${b.label}</span>`;
        el.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', b.html); e.dataTransfer.effectAllowed = 'copy'; document.body.classList.add('dragging'); }); el.addEventListener('dragend', () => { document.body.classList.remove('dragging'); });
        el.addEventListener('click', () => Canvas.insertBlock(b.html, document.getElementById('canvas')));
        grid.appendChild(el);
      });
    };

    cats.forEach((cat, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'block-tab' + (i === 0 ? ' on' : '');
      btn.innerHTML = `<span class="tab-icon">${catIcons[cat] || '+'}</span><span class="tab-label">${catNames[cat] || cat}</span>`;
      btn.addEventListener('click', () => {
        App.qsa('.block-tab', tabs).forEach(x => x.classList.remove('on'));
        btn.classList.add('on');
        render(cat);
      });
      tabs.appendChild(btn);
    });

    wrap.append(tabs, grid);
    render(cats[0] || 'Layout');
  },
};

const Templates = {
  load(key) {
    const tpl = this._tpls[key];
    if (!tpl) { App.toast('Plantilla no encontrada', 'er'); return; }
    const canvas = document.getElementById('canvas');
    if (App.hasContent() && !confirm('¿Reemplazar el contenido actual?')) return;
    canvas.innerHTML = '';
    if (tpl.w && tpl.h) App.setCanvasSize(tpl.w, tpl.h, `${tpl.w}x${tpl.h}`, { history: false });
    else App.setCanvasSize(key.startsWith('email') ? 600 : 1180, 'auto', key.startsWith('email') ? '600xauto' : '1180xauto', { history: false });
    const tmp = document.createElement('div');
    tmp.innerHTML = tpl.html;
    const node = tmp.firstElementChild;
    // Make items editable
    node.querySelectorAll('p,h1,h2,h3,h4,li,a').forEach(el => { if (!el.dataset.label) el.dataset.label = el.tagName.toLowerCase(); el.setAttribute('contenteditable', 'true'); });
    canvas.appendChild(node);
    Canvas.bindEl(node);
    App.qsa('[contenteditable],[data-label],img,a,iframe', node).forEach(el => Canvas.bindEl(el));
    Canvas.bindDropZones(node);
    Selection.clear(); History.push(); Layers.update();
    App.toast('Plantilla cargada ✓', 'ok');
  },

const Export = {
  cleanClone() {
    const clone = document.getElementById('canvas').cloneNode(true);
    clone.querySelectorAll('.drop-zone[data-dropzone="root"],.slot-hint').forEach(n => n.remove());
    clone.querySelectorAll('*').forEach(n => {
      n.removeAttribute('contenteditable');
      n.removeAttribute('data-label');
      n.removeAttribute('data-dropzone');
      n.removeAttribute('draggable');
      n.removeAttribute('data-cid');
      n.classList.remove('el-selected', 'el-hovered', 'drag-over');
      if (!n.className) n.removeAttribute('class');
    });
    return clone.innerHTML.trim();
  },
